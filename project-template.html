<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | JAFFA GROUPS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="project-detail-page">
    
    <!-- Navigation -->
    <nav class="navbar portfolio-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-text">JAFFA</span>
                <span class="logo-sub">GROUPS</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html#about">About</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="nav-cta">
                <a href="index.html#contact" class="nav-cta-btn">Contact Us</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="project-hero">
        <div class="project-hero-bg">
            <img src="{{HERO_IMG}}" alt="{{TITLE}}">
        </div>
        <div class="project-hero-overlay"></div>
        <div class="project-hero-content">
            <h1 class="project-hero-title">{{TITLE}}</h1>
            <p class="project-hero-tagline">{{TAGLINE}}</p>
        </div>
    </section>




    <!-- Project Gallery Section -->
    <section class="project-gallery">
        <div class="immersive-gallery-container">
            <!-- Master Display Area -->
            <div class="gallery-master" id="main-gallery-view">
                <img src="{{GALLERY_IMG_1}}" alt="{{TITLE}} - Main View" class="master-img">
                
                <!-- Text Overlays -->
                <div class="master-overlay">
                    <p class="master-project-context">{{SUBTITLE}} / Perspective</p>
                    <h2 class="master-title" id="gallery-label-title">Architectural Perspective</h2>
                </div>

                <!-- Navigation Buttons -->
                
                
            </div>

            <!-- Thumbnail Bar -->
            <div class="immersive-thumbs">
{{GALLERY_THUMBS}}
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer" style="padding: 6rem 4rem; border-top: 1px solid rgba(255,255,255,0.05);">
        <div style="text-align: center; color: rgba(255,255,255,0.4); font-size: 0.9rem;">
            <p>&copy; 2024 Jaffa Groups Architecture. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="project-detail.js"></script>
